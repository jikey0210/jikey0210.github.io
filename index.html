<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Thi QP-AN 104 Câu - iamtphuc</title>
    <style>
        :root { --primary: #1b5e20; --bg: #f0f2f5; --accent: #ffd600; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; line-height: 1.5; }
        .header { position: sticky; top: 0; background: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; text-align: center; }
        .progress-bar { height: 8px; background: #ddd; border-radius: 4px; overflow: hidden; margin-top: 8px;}
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        .container { padding: 15px; max-width: 650px; margin: auto; }
        .question-block { background: white; margin-bottom: 20px; padding: 18px; border-radius: 12px; border: 2px solid transparent; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .q-title { font-weight: bold; color: #1a1a1a; margin-bottom: 15px; display: block; }
        label { display: flex; align-items: flex-start; gap: 12px; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; cursor: pointer; background: #fafafa; }
        input[type="radio"] { margin-top: 4px; transform: scale(1.3); flex-shrink: 0; }
        .nav-controls { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-between; padding: 15px; box-sizing: border-box; box-shadow: 0 -3px 15px rgba(0,0,0,0.1); z-index: 90; }
        button { padding: 14px 24px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-page { background: #e0e0e0; color: #333; }
        .btn-submit { background: var(--primary); color: white; display: none; }
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; text-align: center; max-width: 450px; width: 100%; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .score-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; margin: 0 auto 15px; border: 5px solid var(--accent); }
        .correct { border-color: #4CAF50 !important; background: #f1f8e9; }
        .wrong { border-color: #f44336 !important; background: #ffebee; }
        .fb-text { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 800; color: var(--primary);">ÔN THI QP-AN</div>
    <div id="page-info" style="font-size: 0.85rem; margin-top: 5px; font-weight: 600;">Trang 1/3</div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
</div>

<div class="container" id="quiz-container"></div>

<div class="nav-controls">
    <button class="btn-page" id="prev-btn" onclick="changePage(-1)">TRƯỚC</button>
    <button class="btn-page" id="next-btn" onclick="changePage(1)">TIẾP THEO</button>
    <button class="btn-submit" id="final-submit" onclick="showResults()">NỘP BÀI</button>
</div>

<div id="result-modal">
    <div class="modal-content">
        <div class="score-circle" id="modal-score">0</div>
        <h2 id="modal-title">Kết quả</h2>
        <p id="modal-desc" style="color: #666; margin-bottom: 25px;"></p>
        <button onclick="location.reload()" style="background: var(--primary); color: white; width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 10px;">LÀM ĐỀ MỚI (RANDOM)</button>
        <button onclick="closeModal()" style="background: #ddd; color: #333; width: 100%; padding: 12px; border-radius: 12px;">XEM LẠI ĐÁP ÁN</button>
    </div>
</div>

<script>
const allQuestions = [
    {q: "Anh (Chị) cho biết vị trí môn học Giáo dục quốc phòng và an ninh là gì?", o: ["Là môn học điều kiện thuộc khối các môn học chung trong chương trình đào tạo trung cấp, cao đẳng", "Là môn học bắt buộc thuộc khối các môn học chung trong chương trình đào tạo trung cấp, cao đẳng", "Là môn học điều kiện, bắt buộc thuộc khối các môn học chung trong chương trình đào tạo trung cấp, cao đẳng", "Cả 3 đáp án trên"], a: 2},
    {q: "Anh (Chị) cho biết đối tượng nghiên cứu của môn học giáo dục quốc phòng - an ninh là gì?", o: ["Nghiên cứu về quan điểm cơ bản có tính lý luận của Đảng về đường lối quân sự", "Nghiên cứu xây dựng nền quốc phòng toàn dân gắn với thế trận an ninh nhân dân, xây dựng lực lượng vũ trang nhân dân", "Nghiên cứu các kiến thức cơ bản về phòng thủ dân sự, rèn luyện kỹ năng quân sự, sẵn sàng tham gia bảo vệ Tổ quốc", "Cả 3 đáp án trên"], a: 3},
    {q: "Anh (Chị) cho biết quá trình nghiên cứu, phát triển giáo dục quốc phòng - an ninh phải nắm vững và vận dụng đúng đắn các quan điểm tiếp cận khoa học nào?", o: ["Quan điểm hệ thống, quan điểm lịch sử, logic, quan điểm thực tiễn", "Quan điểm khách quan, quan điểm lịch sử, logic, quan điểm thực tiễn", "Quan điểm khách quan, toàn diện, quan điểm lịch sử, logic, quan điểm thực tiễn", "Cả 3 đáp án trên"], a: 3},
    {q: "Anh (Chị) cho biết cơ sở phương pháp luận chung nhất của việc nghiên cứu giáo dục quốc phòng - an ninh là gì?", o: ["Lý luận chủ nghĩa Mác - Lênin và tư tưởng Hồ Chí Minh", "Lý luận chủ nghĩa Mác - Lênin và tư tưởng Hồ Chí Minh, đường lối, quan điểm của Đảng ta", "Học thuyết Mác - Lênin và tư tưởng Hồ Chí Minh", "Cả 3 đáp án trên đều sai"], a: 2},
    {q: "Anh (Chị) cho biết trong nghiên cứu xây dựng, phát triển nội dung giáo dục quốc phòng - an ninh với tư cách là một bộ môn khoa học cần chú ý sử dụng kết hợp mấy phương pháp nghiên cứu?", o: ["2", "3", "4", "5"], a: 1},
    {q: "Anh (Chị) điền cụm từ thích hợp vào đáp án đúng: 'Môn học Giáo dục quốc phòng - an ninh nhằm giúp sinh viên thực hiện mục tiêu... hoàn thiện và bồi dưỡng nhân cách, phẩm chất và năng lực của công dân, đáp ứng yêu cầu của sự nghiệp xây dựng và bảo vệ Tổ quốc'", o: ["Hình thành và bồi dưỡng nhân cách", "Hình thành và bồi dưỡng nhân cách, đạo đức của công dân", "Hình thành và bồi dưỡng nhân cách, phẩm chất của công dân", "Hình thành và bồi dưỡng nhân cách, phẩm chất và năng lực của công dân"], a: 3},
    {q: "Anh (Chị) cho biết nội dung chương trình môn học Giáo dục quốc phòng - an ninh theo Thông tư số 05/2020/TT-BGDĐT ngày 18/03/2020 cho sinh viên gồm có mấy học phần?", o: ["3", "4", "5", "6"], a: 1},
    {q: "Anh (Chị) cho biết chương trình Giáo dục quốc phòng - an ninh trình độ trung cấp, cao đẳng ban hành theo Thông tư nào hiện nay?", o: ["Thông tư số 29/2012/TT-BGDĐT ngày 12-9-2012", "Thông tư số 30/2012/TT-BGDĐT ngày 12-9-2012", "Thông tư số 31/2012/TT-BGDĐT ngày 12-9-2012", "Thông tư số 05/2020/TT-BGDĐT ngày 18-03-2020"], a: 3},
    {q: "Anh (Chị) cho biết điều kiện nào để sinh viên được dự thi kết thúc học phần?", o: ["Sinh viên có đủ số lần kiểm tra đạt từ 5 điểm trở lên và chấp hành nghiêm kỷ luật của Nhà trường", "Sinh viên có đủ số lần kiểm tra, mỗi lần kiểm tra đạt từ 5 điểm trở lên và có đủ 80% thời gian có mặt trên lớp", "Có đủ 80% thời gian có mặt trên lớp và chấp hành nghiêm kỷ luật của Nhà trường", "Mỗi lần kiểm tra đạt từ 5 điểm trở lên và có đủ 80% thời gian có mặt trên lớp, chấp hành nghiêm kỷ luật của Nhà trường"], a: 3},
    {q: "Anh (Chị) cho biết sinh viên được cấp Chứng chỉ Giáo dục quốc phòng và an ninh khi nào?", o: ["Điểm trung bình môn học đạt từ 5 điểm trở lên", "Điểm trung bình môn học đạt từ 5 điểm trở lên và chấp hành nghiêm kỷ luật của Nhà trường", "Điểm trung bình môn học đạt từ 5 điểm trở lên và hoàn thành các học phần Giáo dục quốc phòng - an ninh", "Tất cả các học phần đạt từ 5 điểm trở lên và có đủ 80% thời gian có mặt trên lớp, chấp hành nghiêm kỷ luật của Nhà trường"], a: 3},
    {q: "Anh (Chị) cho biết sau khi học xong môn học GDQP-AN người học đạt được về kiến thức là gì?", o: ["Trình bày được những nội dung cơ bản về chiến lược 'Diễn biến hòa bình', bạo loạn lật đổ", "Trình bày được một số nội dung cơ bản về dân tộc và tôn giáo; phòng chống tội phạm", "Trình bày được một số nội dung cơ bản về đội ngũ đơn vị cấp tiểu đội, trung đội; tác dụng, tính năng của súng bộ binh", "Cả 3 đáp án trên"], a: 3},
    {q: "Anh (Chị) cho biết nền quốc phòng toàn dân là gì?", o: ["Sức mạnh quốc phòng của đất nước được xây dựng trên nền tảng nhân lực, vật lực, tinh thần mang tính chất toàn dân, toàn diện, độc lập, tự chủ, tự cường", "Là sức mạnh quốc phòng của đất nước được xây dựng trên nền tảng nhân lực, vật lực mang tính chất toàn dân, toàn diện, độc lập, tự chủ, tự cường", "Là sức mạnh quốc phòng của đất nước được xây dựng trên nền tảng nhân lực, vật lực, tinh thần mang tính chất toàn dân, toàn diện, độc lập", "Cả 3 đáp án trên đều sai"], a: 0},
    {q: "Anh (Chị) cho biết An ninh nhân dân là gì?", o: ["Là sự nghiệp của toàn dân, do nhân dân tiến hành, lực lượng công an nhân dân làm nòng cốt dưới sự lãnh đạo của Đảng và quản lý của Nhà nước", "Là bộ phận của lực lượng vũ trang Việt Nam có vai trò nòng cốt trong sự nghiệp bảo vệ an ninh quốc gia", "Là sức mạnh an ninh của đất nước được xây dựng trên nền tảng nhân lực, vật lực, tinh thần mang tính chất toàn dân", "Cả 3 đáp án trên"], a: 0},
    {q: "Anh (Chị) cho biết xây dựng nền quốc phòng toàn dân, an ninh nhân dân có vị trí như thế nào trong sự nghiệp xây dựng và bảo vệ Tổ quốc Việt Nam XHCN?", o: ["Quan trọng", "Quan trọng, trung tâm", "Quan trọng, then chốt", "Quan trọng, then chốt, xuyên suốt"], a: 2},
    {q: "Anh (Chị) cho biết củng cố quốc phòng, an ninh, bảo vệ Tổ quốc là nhiệm vụ gì của Đảng, Nhà nước và Nhân dân ta?", o: ["Trọng yếu", "Cơ bản, lâu dài", "Trọng yếu, thường xuyên", "Trọng yếu, thường xuyên, xuyên suốt"], a: 2},
    {q: "Anh (Chị) cho biết nền quốc phòng toàn dân, an ninh nhân dân của ta có mấy đặc trưng?", o: ["3", "4", "5", "6"], a: 2},
    {q: "Anh (Chị) cho biết sức mạnh tổng hợp của nền quốc phòng toàn dân, an ninh nhân dân do những yếu tố nào tạo thành?", o: ["Yếu tố chính trị", "Yếu tố kinh tế", "5 yếu tố: chính trị, kinh tế, tư tưởng, khoa học, quân sự", "Cả 3 đáp án trên"], a: 3},
    {q: "Anh (Chị) cho biết xây dựng nền quốc phòng, an ninh nhân dân toàn diện hiện đại là yêu cầu như thế nào?", o: ["Thường xuyên, liên tục", "Tất yếu khách quan", "Cơ bản, thiết thực", "Mang tính chủ quan"], a: 1},
    {q: "Anh (Chị) cho biết mục đích xây dựng nền quốc phòng toàn dân, an ninh nhân dân vững mạnh hiện nay?", o: ["Tạo sức mạnh tổng hợp của đất nước để giữ vững hòa bình, ngăn chặn nguy cơ chiến tranh", "Tạo sức mạnh tổng hợp của đất nước để đánh bại mọi hình thức xâm lược", "Bảo vệ an ninh chính trị, trật tự an toàn xã hội", "Cả 3 đáp án trên"], a: 3},
    {q: "Anh (Chị) cho biết nội dung bảo vệ vững chắc độc lập chủ quyền, thống nhất toàn vẹn lãnh thổ là gì?", o: ["Bảo vệ chủ quyền vùng đất, vùng trời, vùng biển, hải đảo và thềm lục địa", "Kiên quyết đấu tranh chống lại mọi âm mưu và hành động phá hoại", "Bảo vệ các tổ chức Đảng, chính quyền và nhân dân", "Cả 3 đáp án trên"], a: 3},
    {q: "Anh (Chị) cho biết nội dung bảo vệ Đảng, Nhà nước, nhân dân và chế độ xã hội chủ nghĩa là gì?", o: ["Bảo vệ nền tảng tư tưởng chủ nghĩa Mác-Lênin, tư tưởng Hồ Chí Minh", "Bảo vệ các tổ chức Đảng, chính quyền, bảo vệ tính mạng tài sản nhân dân", "Kiên định mục tiêu độc lập dân tộc gắn liền với CNXH", "Cả 3 đáp án trên"], a: 3},
    {q: "Anh (Chị) cho biết nội dung bảo đảm bảo vệ lợi ích quốc gia dân tộc là gì?", o: ["Bảo vệ vị thế, uy tín, quyền bình đẳng quốc gia trên trường quốc tế", "Bảo vệ lợi ích quốc gia dân tộc trên tất cả các lĩnh vực", "Kiên quyết đấu tranh không khoan nhượng với hành động xâm phạm lợi ích", "Cả 3 đáp án trên"], a: 3},
    {q: "Anh (Chị) cho biết nội dung bảo đảm văn hóa tiên tiến đậm đà bản sắc dân tộc là gì?", o: ["Giữ gìn, phát huy các di sản văn hóa, giá trị văn học nghệ thuật", "Xử lý nghiêm minh hành động có tính chống đối ngược lại lợi ích quốc gia", "Phát huy các di sản văn hóa, phong tục, đồng thời làm phong phú thêm truyền thống", "Cả 3 đáp án trên"], a: 2},
    {q: "Anh (Chị) cho biết nội dung giữ vững ổn định chính trị và phát triển đất nước theo định hướng xã hội chủ nghĩa là gì?", o: ["Phải bảo vệ và giữ vững môi trường ổn định chính trị lâu dài", "Không để xảy ra bạo loạn chính trị và 'tự diễn biến'", "Đảm bảo sự phát triển ổn định của nền kinh tế - xã hội", "Cả 3 đáp án trên"], a: 3},
    {q: "Anh (Chị) cho biết khái niệm tiềm lực quốc phòng, an ninh là những lực lượng nào?", o: ["Là sức mạnh quân đội và công an nhân dân", "Khả năng về nhân lực, vật chất, tài chính huy động cho nhiệm vụ QP-AN", "Khả năng huy động của toàn dân", "Cả 3 đáp án trên"], a: 1},
    {q: "Anh (Chị) cho biết tiềm lực chính trị, tinh thần trong xây dựng tiềm lực quốc phòng, an ninh ngày càng vững mạnh là gì?", o: ["Khả năng về chính trị, tinh thần có thể huy động tạo nên sức mạnh thực hiện nhiệm vụ", "Xây dựng tình yêu quê hương đất nước, niềm tin với Đảng", "Xây dựng khối đại đoàn kết toàn dân, nâng cao cảnh giác cách mạng", "Cả 3 đáp án trên"], a: 3},
    {q: "Anh (Chị) cho biết tiềm lực kinh tế trong xây dựng tiềm lực quốc phòng, an ninh ngày càng vững mạnh là gì?", o: ["Khả năng về kinh tế có thể khai thác, huy động phục vụ nhiệm vụ QP-AN", "Đẩy mạnh công nghiệp hóa, hiện đại hóa đất nước", "Kết hợp chặt chẽ phát triển kinh tế với tăng cường QP-AN", "Cả 3 đáp án trên"], a: 3},

function getRandomQuestions(source, count) {
    let shuffled = [...source].sort(() => 0.5 - Math.random());
    return shuffled.slice(0, count);
}

const questions = getRandomQuestions(allQuestions, 25);
const itemsPerPage = 10;
let currentPage = 0;
let userAnswers = new Array(questions.length).fill(null);
let isSubmitted = false;

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    const start = currentPage * itemsPerPage;
    const end = Math.min(start + itemsPerPage, questions.length);
    let html = '';
    for (let i = start; i < end; i++) {
        const item = questions[i];
        const isCorrect = isSubmitted && userAnswers[i] == item.a;
        const isWrong = isSubmitted && userAnswers[i] != null && userAnswers[i] != item.a;
        html += `<div class="question-block ${isCorrect ? 'correct' : (isWrong ? 'wrong' : '')}">
            <span class="q-title">Câu ${i + 1}: ${item.q}</span>
            <div class="options">${item.o.map((opt, idx) => `
                <label><input type="radio" name="q${i}" value="${idx}" ${userAnswers[i] == idx ? 'checked' : ''} ${isSubmitted ? 'disabled' : ''} onchange="saveAnswer(${i}, ${idx})">
                <span>${String.fromCharCode(65 + idx)}. ${opt}</span></label>`).join('')}</div>
            ${isSubmitted ? `<div class="fb-text" style="color:${item.a == userAnswers[i] ? '#2e7d32' : '#c62828'}">Đáp án đúng: ${String.fromCharCode(65 + item.a)}</div>` : ''}
        </div>`;
    }
    container.innerHTML = html;
    updateUI();
}

function saveAnswer(qIdx, ansIdx) { userAnswers[qIdx] = ansIdx; updateProgress(); }
function updateProgress() { const count = userAnswers.filter(a => a !== null).length; document.getElementById('progress-fill').style.width = (count / questions.length) * 100 + '%'; }
function updateUI() {
    const total = Math.ceil(questions.length / itemsPerPage);
    document.getElementById('page-info').innerText = `Trang ${currentPage + 1}/${total}`;
    document.getElementById('prev-btn').style.visibility = currentPage === 0 ? 'hidden' : 'visible';
    document.getElementById('next-btn').style.display = currentPage === total - 1 ? 'none' : 'block';
    document.getElementById('final-submit').style.display = currentPage === total - 1 ? 'block' : 'none';
}
function changePage(step) { currentPage += step; renderQuiz(); window.scrollTo(0, 0); }
function showResults() {
    isSubmitted = true;
    const score = userAnswers.reduce((acc, curr, idx) => (curr == questions[idx].a ? acc + 1 : acc), 0);
    document.getElementById('modal-score').innerText = score;
    document.getElementById('modal-desc').innerText = `Đồng chí đúng ${score}/25 câu ngẫu nhiên.`;
    document.getElementById('result-modal').style.display = 'flex';
}
function closeModal() { document.getElementById('result-modal').style.display = 'none'; renderQuiz(); }
renderQuiz();
</script>
